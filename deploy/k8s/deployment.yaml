# Go + ONNX serving deployment. Point `image` at your registry
# (e.g. the ECR URI printed by deploy/aws/push-ecr.sh), then:
#   kubectl apply -f deploy/k8s/
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ebay-price-go
  labels:
    app: ebay-price-go
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ebay-price-go
  template:
    metadata:
      labels:
        app: ebay-price-go
    spec:
      containers:
        - name: server
          image: ebay-price-go:latest # <account>.dkr.ecr.<region>.amazonaws.com/ebay-price-go:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet: # /health only reports ok after the startup parity self-check
              path: /health
              port: 8080
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15
