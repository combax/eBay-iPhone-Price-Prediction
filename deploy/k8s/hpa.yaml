apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ebay-price-go
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ebay-price-go
  minReplicas: 2
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
